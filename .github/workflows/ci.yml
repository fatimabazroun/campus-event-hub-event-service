name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: ${{ secrets.GCP_REGION }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: ${{ secrets.AR_REPO }}
  SERVICE_NAME: campus-event-hub-event-service
  CLOUD_SQL_CONNECTION_NAME: swe-455-487017:us-central1:campus-event-hub

jobs:
  # ── Factor 5: strict build / release / run separation ──────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          API_KEY: changeme-in-production

  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    # Only deploy on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Keyless GCP auth via Workload Identity Federation (no long-lived keys)
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPO }}/campus-event-hub-event-service:${{ github.sha }}"          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Factor 12: run DB migrations as a one-off admin process before releasing
      - name: Run DB migrations (Cloud Run Job)
        run: |
          gcloud run jobs delete migrate-${{ github.sha }} --region ${{ env.REGION }} --quiet || true
          gcloud run jobs create migrate-${{ github.sha }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --service-account ${{ secrets.WIF_SERVICE_ACCOUNT }} \
            --set-cloudsql-instances ${{ env.CLOUD_SQL_CONNECTION_NAME }} \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --command "alembic" \
            --args "upgrade,head" \
            --max-retries 1 \
            --execute-now \
            --wait \
          && gcloud run jobs delete migrate-${{ github.sha }} --region ${{ env.REGION }} --quiet

      # Factor 5: deploy the pre-built, pre-migrated image
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --min-instances 0 \
            --max-instances 10 \
            --cpu 1 \
            --memory 512Mi \
            --timeout 60 \
            --concurrency 80
          # Note: IAM (public access) and env vars are managed by Terraform.
          # Do NOT pass --allow-unauthenticated or --no-allow-unauthenticated here.
